[package]
name = "libra-tokens"
version = "0.1.8"
edition = "2021"
description = "Libra Design System — Rust design tokens: color constants, lerp, CSS generation, theme loading. The Rust-native counterpart of go-tokens."
license = "MIT"
repository = "https://github.com/goodie1972/libra-design"
homepage = "https://github.com/goodie1972/libra-design"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
